<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>#TEACH Compliance Outreach</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{
    --navy:#002E5D; --navy-700:#01214a; --crimson:#8B0000; --sky:#12A7E6;
    --ink:#12233b; --muted:#5b6b80; --line:#e2e8f2; --bg:#f4f7fb;
    --card:#ffffff; --ok:#1a7f4b; --ok-bg:#e6f5ec; --warn:#9a5b00;
    --warn-bg:#fdf2e0; --err:#8B0000; --err-bg:#fdecec; --info-bg:#e8f5fd;
    --radius:12px; --shadow:0 1px 3px rgba(4,25,60,.08),0 8px 24px rgba(4,25,60,.06);
    --font:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:var(--font);background:var(--bg);color:var(--ink);
    font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
  a{color:var(--sky);text-decoration:none} a:hover{text-decoration:underline}
  h1,h2,h3{margin:0;color:var(--navy);font-weight:700;letter-spacing:-.01em}
  .muted{color:var(--muted)} .mono{font-variant-numeric:tabular-nums}
  button{font-family:inherit;cursor:pointer;border:none;border-radius:8px;
    font-weight:600;font-size:14px;padding:10px 16px;transition:.12s}
  button:disabled{opacity:.5;cursor:not-allowed}
  .btn{background:var(--navy);color:#fff} .btn:hover:not(:disabled){background:var(--navy-700)}
  .btn-sky{background:var(--sky);color:#fff} .btn-sky:hover:not(:disabled){filter:brightness(.94)}
  .btn-ghost{background:#eef2f8;color:var(--navy)} .btn-ghost:hover:not(:disabled){background:#e2e8f2}
  .btn-danger{background:var(--crimson);color:#fff} .btn-danger:hover:not(:disabled){filter:brightness(1.08)}
  .btn-sm{padding:6px 11px;font-size:13px}
  input,select,textarea{font-family:inherit;font-size:14px;width:100%;padding:9px 11px;
    border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink)}
  input:focus,select:focus,textarea:focus{outline:2px solid var(--sky);outline-offset:-1px;border-color:var(--sky)}
  label{display:block;font-size:13px;font-weight:600;color:var(--ink);margin:0 0 5px}
  textarea{resize:vertical;min-height:80px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);padding:22px}
  .grid{display:grid;gap:16px}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;
    padding:3px 10px;border-radius:999px;background:#eef2f8;color:var(--navy)}
  .pill.ok{background:var(--ok-bg);color:var(--ok)}
  .pill.warn{background:var(--warn-bg);color:var(--warn)}
  .pill.err{background:var(--err-bg);color:var(--err)}
  .pill.sky{background:var(--info-bg);color:#0a6ea3}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th{text-align:left;font-size:12px;text-transform:uppercase;letter-spacing:.04em;
    color:var(--muted);font-weight:700;padding:10px 12px;border-bottom:2px solid var(--line)}
  td{padding:11px 12px;border-bottom:1px solid var(--line);vertical-align:middle}
  tr:hover td{background:#f9fbfe}
  .banner{padding:12px 16px;border-radius:10px;font-size:14px;margin-bottom:14px;
    display:flex;gap:10px;align-items:flex-start}
  .banner.err{background:var(--err-bg);color:var(--err);border:1px solid #f3c9c9}
  .banner.ok{background:var(--ok-bg);color:var(--ok);border:1px solid #bfe3cd}
  .banner.warn{background:var(--warn-bg);color:var(--warn);border:1px solid #f2ddb3}
  .banner.info{background:var(--info-bg);color:#0a6ea3;border:1px solid #bfe3f7}

  /* layout */
  #app{min-height:100vh}
  .topbar{background:var(--navy);color:#fff;padding:0 24px;height:60px;display:flex;
    align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40}
  .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:17px;letter-spacing:-.02em}
  .brand .tag{color:var(--sky)}
  .topbar .who{font-size:13px;color:#c9d6e8;display:flex;gap:12px;align-items:center}
  .shell{display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - 60px)}
  .side{background:#fff;border-right:1px solid var(--line);padding:16px 12px}
  .nav a{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;
    color:var(--ink);font-weight:600;font-size:14px;margin-bottom:2px}
  .nav a:hover{background:#eef2f8;text-decoration:none}
  .nav a.active{background:var(--navy);color:#fff}
  .nav .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);
    margin:16px 8px 6px;font-weight:700}
  .main{padding:26px 30px;max-width:1120px}
  .page-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:20px;flex-wrap:wrap;gap:12px}
  .page-head h1{font-size:24px}
  .sub{color:var(--muted);font-size:14px;margin-top:3px}

  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px}
  .stat{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px}
  .stat .n{font-size:30px;font-weight:800;color:var(--navy);line-height:1}
  .stat .k{font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);
    font-weight:700;margin-top:6px}
  .stat.accent .n{color:var(--sky)} .stat.good .n{color:var(--ok)} .stat.bad .n{color:var(--crimson)}

  .steps{display:flex;gap:8px;margin-bottom:22px;flex-wrap:wrap}
  .step{flex:1;min-width:130px;padding:12px 14px;border-radius:10px;background:#fff;
    border:1px solid var(--line);font-size:13px;font-weight:600;color:var(--muted)}
  .step .num{display:inline-flex;width:22px;height:22px;border-radius:999px;background:#eef2f8;
    color:var(--navy);align-items:center;justify-content:center;font-size:12px;margin-right:8px}
  .step.active{border-color:var(--navy);color:var(--navy)}
  .step.active .num{background:var(--navy);color:#fff}
  .step.done{border-color:var(--ok);color:var(--ok)} .step.done .num{background:var(--ok);color:#fff}

  .modal-bg{position:fixed;inset:0;background:rgba(6,20,45,.55);display:flex;
    align-items:flex-start;justify-content:center;padding:40px 16px;z-index:60;overflow:auto}
  .modal{background:#fff;border-radius:14px;max-width:720px;width:100%;box-shadow:var(--shadow);
    padding:26px;max-height:90vh;overflow:auto}
  .modal.wide{max-width:900px}
  .modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
  .x{background:none;color:var(--muted);font-size:22px;padding:2px 8px}

  .field{margin-bottom:14px}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .three{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
  .info-panel{background:#f6f9fd;border:1px solid var(--line);border-radius:10px;padding:14px 16px;
    font-size:14px;line-height:1.7}
  .info-panel b{color:var(--navy)}
  .email-frame{border:1px solid var(--line);border-radius:10px;padding:22px;background:#fff;
    font-size:14px;line-height:1.65}
  .email-frame.mobile{max-width:380px;margin:0 auto}
  .toolbar{display:flex;gap:6px;flex-wrap:wrap;padding:8px;background:#f6f9fd;border:1px solid var(--line);
    border-bottom:none;border-radius:8px 8px 0 0}
  .toolbar button{background:#fff;border:1px solid var(--line);color:var(--navy);padding:5px 10px;font-size:13px}
  .chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
  .chip{font-size:12px;background:#eef2f8;color:var(--navy);border:1px solid var(--line);
    padding:4px 9px;border-radius:7px;font-weight:600;cursor:pointer}
  .chip:hover{background:var(--sky);color:#fff;border-color:var(--sky)}
  .checkbox{display:flex;gap:10px;align-items:flex-start;font-size:14px;font-weight:500;color:var(--ink)}
  .checkbox input{width:auto;margin-top:3px}
  .tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:16px}
  .tabs button{background:none;color:var(--muted);border-bottom:2px solid transparent;border-radius:0;padding:9px 14px}
  .tabs button.active{color:var(--navy);border-bottom-color:var(--navy)}
  .empty{text-align:center;padding:48px 20px;color:var(--muted)}
  .empty h3{color:var(--navy);margin-bottom:6px}
  .center{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .login{max-width:400px;width:100%}
  .login .brand-lg{font-size:26px;font-weight:800;color:var(--navy);text-align:center;margin-bottom:4px;letter-spacing:-.02em}
  .login .brand-lg .tag{color:var(--sky)}
  .spin{width:34px;height:34px;border:3px solid #dbe6f3;border-top-color:var(--navy);
    border-radius:50%;animation:sp 1s linear infinite;margin:20px auto}
  @keyframes sp{to{transform:rotate(360deg)}}
  .toast{position:fixed;bottom:24px;right:24px;z-index:90;background:var(--navy);color:#fff;
    padding:13px 18px;border-radius:10px;box-shadow:var(--shadow);font-weight:600;font-size:14px;
    max-width:360px}
  .toast.err{background:var(--crimson)} .toast.ok{background:var(--ok)}
  .filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .filters select,.filters input{width:auto;min-width:150px}
  @media(max-width:820px){
    .shell{grid-template-columns:1fr}.side{display:none}.two,.three{grid-template-columns:1fr}
    .main{padding:18px}
  }
  .hidden{display:none!important}
</style>
</head>
<body>
<div id="app"><div class="center"><div class="spin"></div></div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="app.js"></script>
</body>
</html>
