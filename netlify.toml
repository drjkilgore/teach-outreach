[build]
  publish = "."
  functions = "netlify/functions"

# Runs the reminder queue every hour. Candidates marked complete or excluded
# are skipped inside the function, so this only ever sends due reminders.
[functions."run-followups"]
  schedule = "0 * * * *"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
